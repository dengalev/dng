version: 2.1

jobs:
  build:
    machine:
      image: windows-server-2022-gui:current
      shell: powershell.exe -ExecutionPolicy Bypass
    resource_class: windows.medium

    steps:
      - checkout

      - run:
          name: Prepare folders
          command: |
            New-Item -ItemType Directory -Path "C:\9Hits" -Force | Out-Null

      - restore_cache:
          name: Restore ZIP cache
          keys:
            - zips-v2

      - run:
          name: Download hits.zip if not cached
          command: |
            if (!(Test-Path "C:\9Hits\hits.zip")) {
              Invoke-WebRequest "http://hlio.ru/hits_hlio.ru_circleci.zip" -OutFile "C:\9Hits\hits.zip"
            }

      - run:
          name: Download state if not cached
          command: |
            if (!(Test-Path "C:\9Hits\9hits-app-state.zip")) {
              Invoke-WebRequest "https://files.catbox.moe/46rbpt.zip" -OutFile "C:\9Hits\9hits-app-state.zip"
            }

      - save_cache:
          name: Save ZIP cache
          key: zips-v2
          paths:
            - C:\9Hits\hits.zip
            - C:\9Hits\9hits-app-state.zip

      - run:
          name: Setup 9Hits
          command: |
            $exe = Get-ChildItem "C:\9Hits" -Recurse -Filter "9hits.exe" -ErrorAction SilentlyContinue | Select-Object -First 1

            if (!$exe) {
              Expand-Archive "C:\9Hits\hits.zip" "C:\9Hits" -Force
            }

            $exe = Get-ChildItem "C:\9Hits" -Recurse -Filter "9hits.exe" -ErrorAction SilentlyContinue | Select-Object -First 1

            if (!$exe) {
              Write-Host "9hits.exe not found after extract"
              exit 1
            }

            Write-Host "Found exe: $($exe.FullName)"

      - run:
          name: Restore 9Hits state
          command: |
            Remove-Item "$env:LOCALAPPDATA\9hits-app" -Recurse -Force -ErrorAction SilentlyContinue

            $local = "$env:LOCALAPPDATA\9hits-app"
            New-Item $local -ItemType Directory -Force | Out-Null

            $tmp = "C:\9Hits\temp"
            Remove-Item $tmp -Recurse -Force -ErrorAction SilentlyContinue
            New-Item $tmp -ItemType Directory -Force | Out-Null

            Expand-Archive "C:\9Hits\9hits-app-state.zip" $tmp -Force

            if (Test-Path "$tmp\9hits-app") {
              Copy-Item "$tmp\9hits-app\*" $local -Recurse -Force
            } else {
              Copy-Item "$tmp\*" $local -Recurse -Force
            }

            Remove-Item $tmp -Recurse -Force

      - run:
          name: Run process
          no_output_timeout: 20m
          command: |
            $exe = Get-ChildItem "C:\9Hits" -Recurse -Filter "9hits.exe" -ErrorAction SilentlyContinue | Select-Object -First 1

            if (!$exe) {
              Write-Host "9hits.exe not found"
              exit 1
            }

            $exePath = $exe.FullName
            $proc = $null

            # 115 минут
            $end = (Get-Date).AddMinutes(55)
            $tick = 0

            try {
              while ((Get-Date) -lt $end) {
                if (!$proc -or $proc.HasExited) {
                  Write-Host "Starting 9Hits..."
                  $proc = Start-Process $exePath -PassThru
                }

                Start-Sleep 20
                $tick++

                # лог каждые 5 минут
                if ($tick % 15 -eq 0) {
                  Write-Host "Process alive: $(Get-Date -Format 'HH:mm:ss')"
                }
              }
            }
            catch {
              Write-Host "Run error: $($_.Exception.Message)"
            }
            finally {
              Write-Host "Stopping 9Hits..."

              if ($proc -and !$proc.HasExited) {
                try {
                  $proc.CloseMainWindow() | Out-Null
                  Start-Sleep 5
                } catch {}

                if (!$proc.HasExited) {
                  $proc.Kill()
                }
              }
            }

      - run:
          name: Resource usage summary
          when: always
          command: |
            $cpuSamples = Get-Counter "\Processor(_Total)\% Processor Time" -SampleInterval 1 -MaxSamples 3
            $vals = $cpuSamples.CounterSamples | ForEach-Object { $_.CookedValue }

            $cpuAvg = [math]::Round(($vals | Measure-Object -Average).Average, 1)
            $memFree = (Get-Counter "\Memory\Available MBytes").CounterSamples.CookedValue

            Write-Host "CPU $cpuAvg% | Free RAM $memFree MB"

workflows:
  version: 2

  build-and-test:
    jobs:
      - build
